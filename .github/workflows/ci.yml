name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Node syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check every JavaScript file
        run: |
          set -e
          fail=0
          for f in $(git ls-files '*.js'); do
            if ! node --check "$f"; then
              echo "::error file=$f::Syntax error"
              fail=1
            fi
          done
          exit $fail

      - name: Smoke-load core modules
        run: |
          # If config or utils throws on require, this catches it.
          node -e "require('./config'); require('./utils'); console.log('config + utils load OK')"
